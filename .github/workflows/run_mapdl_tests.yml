name: MAPDL dependent tests for paths tool

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - '*'
    branches:
      - main

env:
  PACKAGE_NAME: ansys-tools-common
  MAIN_PYTHON_VERSION: 3.14

permissions:
  contents: read # required to read files
  packages: read # required to pull container images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-tests:
    name: Build tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ansys/mapdl:v26.1.0@sha256:0c570344f3859b17a01bdf38f9fc69659823511370864b3233ac13159aa73550
      options: -u=0:0 --entrypoint /bin/bash
      credentials:
        username: ${{ secrets.GH_USERNAME }}
        password: ${{ secrets.GH_TOKEN }}
    env:
      ANSYS_LOCAL: true
      ON_UBUNTU: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          enable-cache: false

      - name: Install project dependencies
        run: |
          uv sync --no-dev --group tests --frozen

      - name: Install test package containing entrypoint
        run: |
          uv pip install tests/launcher/pkg_with_entrypoint

      - name: Run tests
        env:
          PACKAGE_NAMESPACE: ${{ env.PACKAGE_NAMESPACE }}
        run: |
          uv run --no-sync pytest \
            -vx \
            --cov=${PACKAGE_NAMESPACE} --cov-report=term --cov-report=xml:.cov/coverage.xml --cov-report=html:.cov/html
